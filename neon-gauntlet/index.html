<!doctype html><html lang=en><head><meta charset=utf8>
<meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Neon Gauntlet</title><link rel=stylesheet href="_game.css">
<style>
  #game { background:#070912; }
  #c { image-rendering: pixelated; image-rendering: crisp-edges; }
  #hud { display:none; }
  #topbar { top: 18px; right: 18px; }
  .icon-btn {
    color:#dff6ff; background:linear-gradient(180deg,#29324c,#111827);
    border-color:#5a6d9c; border-radius:8px; box-shadow:0 0 0 2px #090b16, 0 10px 22px rgba(0,0,0,.38);
  }
  #pad {
    gap:6px; padding:6px 10px 8px; background:linear-gradient(180deg,#181c2c,#090b12);
    border-top:2px solid #3b4568; backdrop-filter:none;
  }
  .btn {
    min-width:48px; height:44px; border-radius:8px; color:#dff6ff;
    background:linear-gradient(180deg,#2c3552,#121827); border-color:#65769f;
    box-shadow:0 4px 0 #050711, 0 10px 18px rgba(0,0,0,.32); font-size:18px;
  }
  .wide { min-width:82px; font-size:13px; text-transform:uppercase; letter-spacing:.04em; }
  @media (pointer:fine) and (min-width:900px) { #pad { display:none; } }
</style></head>
<body><div id=game><canvas id=c></canvas><div id=hud></div><div id=over></div>
<div id=pad>
  <button class=btn data-dir=left>◀</button><button class=btn data-dir=up>▲</button>
  <button class=btn data-dir=down>▼</button><button class=btn data-dir=right>▶</button>
  <button class="btn wide" data-act=punch>Punch</button><button class="btn wide" data-act=kick>Kick</button>
  <button class="btn wide" data-act=guard>Guard</button>
</div></div>
<script src="_harness.js"></script>
<script>
const LEVELS = [
  { name:'Metro Arcade', boss:'Switchblade Sora', sky:'#160d2f', wall:'#4a1b5b', neon:'#ff3f8f', alt:'#23d5ff', floor:'#38304b', hp:170, minions:4, props:'arcade' },
  { name:'Rainline Market', boss:'Chrome Juno', sky:'#0d2036', wall:'#184963', neon:'#50e7ff', alt:'#ffd166', floor:'#2e4b5f', hp:195, minions:5, props:'market' },
  { name:'Rooftop Relay', boss:'Aero Knox', sky:'#111b34', wall:'#314566', neon:'#ffe66d', alt:'#7aa2ff', floor:'#3d4254', hp:225, minions:5, props:'roof' },
  { name:'Signal Docks', boss:'Harbor Vex', sky:'#0b2d32', wall:'#15535a', neon:'#4dd4ac', alt:'#ff8f4d', floor:'#26454b', hp:255, minions:6, props:'dock' },
  { name:'Laser Garden', boss:'Prism Vale', sky:'#261039', wall:'#5a2464', neon:'#c77dff', alt:'#4dd4ac', floor:'#473456', hp:285, minions:6, props:'garden' },
  { name:'Turbo Underpass', boss:'Torque Mako', sky:'#211720', wall:'#5f352e', neon:'#ff8f4d', alt:'#ffd166', floor:'#4b3b38', hp:325, minions:7, props:'underpass' },
  { name:'Satellite Mall', boss:'Nova Pike', sky:'#0f1a33', wall:'#2c416b', neon:'#7aa2ff', alt:'#ff5c8a', floor:'#38435f', hp:365, minions:7, props:'mall' },
  { name:'Subzero Station', boss:'Frost Riven', sky:'#0b2638', wall:'#2c5b75', neon:'#9ee7ff', alt:'#ffffff', floor:'#406071', hp:410, minions:8, props:'station' },
  { name:'Data Cathedral', boss:'Cipher Saint', sky:'#1b1039', wall:'#3e2b76', neon:'#f05cff', alt:'#50e7ff', floor:'#302954', hp:465, minions:8, props:'data' },
  { name:'Midnight Tower', boss:'Zero Monarch', sky:'#050715', wall:'#1a214a', neon:'#ff334f', alt:'#c77dff', floor:'#252a49', hp:560, minions:9, props:'tower' },
]

let G, W = 960, H = 540
let levelIndex, level, player, enemies, defeated, projectiles, keys, cam, message, flash, spawnedBoss, cleared
const WORLD_W = 2300
const assets = {
  stage1: img('neon/assets/stages/stage-01-metro-arcade.png'),
  player: img('neon/assets/sprites/player-sheet.png'),
  enemy: img('neon/assets/sprites/enemy-rival-sheet.png'),
}
function spr(x,y,w,h,ax,ay){ return {x,y,w,h,ax:ax == null ? w/2 : ax,ay:ay == null ? h : ay} }
const PLAYER_SPRITES = {
  idle: [spr(78,20,118,210,59),spr(293,20,118,210,59),spr(500,19,136,211,68),spr(724,20,135,210,67),spr(945,19,134,211,67),spr(1152,16,125,214,62),spr(1360,13,102,217,51)],
  walk: [spr(66,271,137,204,68),spr(263,268,142,207,71),spr(471,267,146,208,73),spr(696,275,133,200,66)],
  punch: [spr(862,287,188,189,74),spr(1067,284,194,191,76),spr(1266,303,219,173,73)],
  kick: [spr(59,523,169,195,67),spr(275,533,176,185,70),spr(496,531,255,186,82)],
  guard: [spr(879,533,121,184,60),spr(1085,534,125,183,62),spr(1307,540,118,177,59)],
  hurt: [spr(47,770,142,204,79),spr(238,777,174,197,88)],
  jump: [spr(475,744,117,168,59),spr(660,732,144,192,72),spr(871,756,99,177,49)],
}
const ENEMY_SPRITES = {
  idle: [spr(75,20,129,210,64),spr(271,20,128,210,64),spr(493,20,126,210,63),spr(704,20,139,210,69),spr(909,20,133,210,66),spr(1118,20,133,210,66),spr(1323,20,109,210,54)],
  walk: [spr(75,268,137,206,68),spr(275,270,141,204,70),spr(487,268,130,206,65)],
  punch: [spr(885,293,193,181,82),spr(1112,293,173,181,76),spr(1298,298,203,176,78)],
  kick: [spr(61,524,164,195,70),spr(278,533,175,186,73),spr(501,527,226,192,79)],
  guard: [spr(867,533,135,186,67),spr(1085,533,129,186,64),spr(1305,538,127,181,63)],
  hurt: [spr(45,765,147,211,82),spr(242,785,165,191,84)],
  jump: [spr(462,737,112,178,56),spr(645,729,136,196,68),spr(852,756,107,177,53)],
  down: [spr(962,914,191,73,95),spr(1181,935,175,52,87),spr(1370,932,144,55,72)],
}

function img(src){ const image = new Image(); image.src = src; return image }
function ready(image){ return image.complete && image.naturalWidth > 0 }
function frameAt(frames,index){ return frames[Math.max(0,Math.min(frames.length-1,index))] || frames[0] }
function drawSpriteFrame(ctx,image,frame,scale,ground=18){
  const dx=-frame.ax*scale, dy=ground-frame.ay*scale
  ctx.drawImage(image,frame.x,frame.y,frame.w,frame.h,dx,dy,frame.w*scale,frame.h*scale)
}

function reset(){ levelIndex = 0; startLevel() }
function startLevel(){
  level = LEVELS[levelIndex]
  player = { x:120, y:.72, z:0, vz:0, hp:150, max:150, face:1, atk:0, kind:'', guard:false, hurt:0, combo:0, comboT:0 }
  enemies = []
  defeated = []
  projectiles = []
  keys = {}
  cam = 0
  message = 'STAGE ' + (levelIndex + 1) + '  ' + level.name
  flash = 1500
  spawnedBoss = false
  cleared = false
  for (let i=0;i<level.minions;i++) spawnMinion(520 + i * 155 + Math.random() * 80, i)
}
function spawnMinion(x,i=0){
  const roles = [
    { role:'striker', hp:48, speed:150, dmg:9, range:58, shirt:'#f2c14e', pants:'#16192e', hair:'#111' },
    { role:'runner', hp:40, speed:205, dmg:8, range:54, shirt:'#35d0ba', pants:'#20264a', hair:'#f4d7a1' },
    { role:'bruiser', hp:76, speed:104, dmg:13, range:68, shirt:'#ff5c8a', pants:'#111827', hair:'#313552' },
    { role:'thrower', hp:44, speed:126, dmg:7, range:180, shirt:'#8be9fd', pants:'#182136', hair:'#10131d' },
  ]
  const r = roles[(levelIndex + i) % roles.length] || roles[0]
  const hp = r.hp + levelIndex * (r.role === 'bruiser' ? 11 : 7)
  enemies.push({ type:'rival', role:r.role, pose:Math.random()*3|0, x, y:.58+Math.random()*.27, hp, max:hp, face:-1, atk:0, hurt:0, cool:360+Math.random()*760, tele:0, speed:r.speed, dmg:r.dmg, range:r.range, palette:r })
}
function spawnBoss(){
  spawnedBoss = true
  enemies.push({ type:'boss', name:level.boss, x:1760, y:.7, hp:level.hp, max:level.hp, face:-1, atk:0, hurt:0, cool:900, tele:0, move:'', phase:0,
    palette:{ shirt:level.neon, pants:'#101629', hair:level.alt } })
  message = 'BOSS  ' + level.boss
  flash = 1600
  G.sound('bump')
}
function sameLane(a,b){ return Math.abs(a.y-b.y) < .095 }
function hitRange(a,b,r){ return Math.abs(a.x-b.x) < r && sameLane(a,b) && a.z < 26 }
function hurtEnemy(e,dmg,knock){
  if (e.hurt > 0) return
  e.hp -= dmg
  e.hurt = 180
  e.x += knock * player.face
  G.burst(e.x-cam, e.y*H-54, e.palette.shirt, e.type === 'boss' ? 18 : 10)
  G.popText(e.x-cam, e.y*H-86, String(dmg), '#ffd166')
  G.addScore((e.type === 'boss' ? 35 : 10) + Math.min(30, player.combo * 2))
  if (player.combo > 2) G.shake(Math.min(12, player.combo * 2))
  if (e.hp <= 0) {
    defeated.push({ x:e.x, y:e.y, face:e.face, t:e.type === 'boss' ? 2200 : 1400, role:e.role, palette:e.palette, boss:e.type === 'boss' })
    G.burst(e.x-cam, e.y*H-68, '#fff7df', e.type === 'boss' ? 30 : 18)
  }
}
function hurtPlayer(dmg, dir){
  if (player.hurt > 0) return
  if (player.guard && dir !== player.face) {
    G.burst(player.x-cam, player.y*H-58, '#9ee7ff', 8)
    G.sound('bump')
    return
  }
  player.hp -= dmg
  player.hurt = 470
  player.x += dir * 30
  G.shake(8)
  if (player.hp <= 0) G.gameover()
}
function attack(kind){
  if (player.atk > 95) return
  if (player.comboT <= 0) player.combo = 0
  player.combo = Math.min(5, player.combo + 1)
  player.comboT = 760
  player.kind = kind
  player.atk = kind === 'kick' ? 330 : 230
  const finisher = kind === 'punch' && player.combo >= 3
  const dmg = kind === 'kick' ? 25 : (finisher ? 28 : 16)
  const range = kind === 'kick' ? 90 : (finisher ? 82 : 66)
  let hit = false
  for (const e of enemies) {
    if (e.hp > 0 && hitRange(player,e,range) && Math.sign(e.x-player.x) === player.face) {
      hurtEnemy(e,dmg,kind==='kick'||finisher?42:20)
      hit = true
    }
  }
  if (hit) G.sound('score')
}
function setMove(k,d){
  const m = { ArrowLeft:'left', a:'left', A:'left', ArrowRight:'right', d:'right', D:'right', ArrowUp:'up', w:'up', W:'up', ArrowDown:'down', s:'down', S:'down' }[k]
  if (m) keys[m] = d
}
function onKey(k,d){
  setMove(k,d)
  if (!d) { if (k === 'l' || k === 'L') player.guard = false; return }
  if (k === 'j' || k === 'J' || k === 'Enter') attack('punch')
  if (k === 'k' || k === 'K') attack('kick')
  if (k === 'l' || k === 'L') player.guard = true
  if (k === ' ' && player.z === 0) { player.vz = 520; G.sound('score') }
}
function onButton(a){
  if (a === 'punch') attack('punch')
  else if (a === 'kick') attack('kick')
  else if (a === 'guard') player.guard = true
  else keys[a] = true
}
function stopGuard(){ player.guard = false; keys.left = keys.right = keys.up = keys.down = false }

function updatePlayer(dt){
  const sp = player.guard ? 150 : 275
  if (keys.left) { player.x -= sp*dt/1000; player.face = -1 }
  if (keys.right) { player.x += sp*dt/1000; player.face = 1 }
  if (keys.up) player.y -= .34*dt/1000
  if (keys.down) player.y += .34*dt/1000
  player.x = Math.max(48, Math.min(WORLD_W-80, player.x))
  player.y = Math.max(.54, Math.min(.88, player.y))
  player.z = Math.max(0, player.z + player.vz*dt/1000)
  if (player.z > 0) player.vz -= 1450*dt/1000
  else player.vz = 0
  player.atk = Math.max(0, player.atk-dt)
  player.hurt = Math.max(0, player.hurt-dt)
  player.comboT = Math.max(0, player.comboT-dt)
  if (player.comboT <= 0) player.combo = 0
  cam = Math.max(0, Math.min(WORLD_W-W, player.x-W*.36))
}
function updateEnemies(dt){
  for (const e of enemies) {
    if (e.hp <= 0) continue
    e.hurt = Math.max(0, e.hurt-dt)
    e.atk = Math.max(0, e.atk-dt)
    if (e.tele > 0) {
      e.tele -= dt
      if (e.tele <= 0) {
        e.atk = e.move === 'rush' ? 420 : 300
        if (e.type === 'boss' && e.move === 'blast') projectiles.push({ x:e.x + e.face*42, y:e.y, vx:e.face*(430+levelIndex*14), t:2400, color:level.neon, big:true })
        else if (e.type === 'boss' && e.move === 'rush') { e.x += e.face * 110; if (hitRange(e,player,115)) hurtPlayer(20+levelIndex, e.face) }
        else if (e.role === 'thrower') projectiles.push({ x:e.x + e.face*32, y:e.y, vx:e.face*310, t:1900, color:e.palette.shirt })
        else if (hitRange(e,player,e.type==='boss'?105:e.range)) hurtPlayer(e.type === 'boss' ? 18+levelIndex : e.dmg, e.face)
        e.cool = e.type === 'boss' ? 680 + Math.random()*420 : 820 + Math.random()*560
      }
      continue
    }
    e.cool -= dt
    const dx = player.x - e.x
    const dy = player.y - e.y
    e.face = dx < 0 ? -1 : 1
    const speed = e.type === 'boss' ? 112 + levelIndex*3 : e.speed
    if (Math.abs(dx) > (e.type === 'boss' ? 86 : 62)) e.x += Math.sign(dx) * speed * dt/1000
    if (Math.abs(dy) > .03) e.y += Math.sign(dy) * (e.type === 'boss' ? .16 : .22) * dt/1000
    if (e.cool <= 0) {
      if (e.type === 'boss') {
        e.move = Math.random() < .48 ? 'blast' : 'rush'
        e.tele = e.move === 'blast' ? 520 : 380
      } else if (e.role === 'thrower' && Math.abs(dx) < e.range && sameLane(e,player)) {
        e.move = 'throw'; e.tele = 420
      } else if (hitRange(e,player,e.range)) {
        e.move = 'strike'; e.tele = e.role === 'bruiser' ? 360 : 230
      } else e.cool = 250
    }
  }
  enemies = enemies.filter(e => e.hp > 0)
}
function updateProjectiles(dt){
  for (const p of projectiles) {
    p.x += p.vx*dt/1000
    p.t -= dt
    if (Math.abs(p.x-player.x) < 34 && Math.abs(p.y-player.y) < .08) {
      hurtPlayer(13, Math.sign(p.vx))
      p.t = 0
      G.burst(p.x-cam, p.y*H-52, p.color, 12)
    }
  }
  projectiles = projectiles.filter(p => p.t > 0 && p.x > cam-120 && p.x < cam+W+180)
}
function update(dt,api){
  G = api
  flash = Math.max(0, flash-dt)
  defeated.forEach(d=>d.t-=dt)
  defeated = defeated.filter(d=>d.t>0)
  updatePlayer(dt)
  updateEnemies(dt)
  updateProjectiles(dt)
  if (!spawnedBoss && enemies.length === 0) spawnBoss()
  if (spawnedBoss && enemies.length === 0 && !cleared) {
    cleared = true
    G.addScore(280 + levelIndex * 90)
    if (levelIndex < LEVELS.length-1) { levelIndex++; setTimeout(startLevel,900) }
    else { message = 'GAUNTLET CLEARED'; flash = 2500; setTimeout(()=>G.gameover(),1200) }
  }
}

function px(ctx,x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)) }
function text(ctx,txt,x,y,size,c,align='left'){
  ctx.font = '900 '+size+'px ui-rounded, system-ui'
  ctx.textAlign = align
  ctx.lineWidth = Math.max(3,size*.16)
  ctx.strokeStyle = 'rgba(0,0,0,.72)'
  ctx.strokeText(txt,x,y)
  ctx.fillStyle = c
  ctx.fillText(txt,x,y)
}
function drawGlyphs(ctx,x,y,c){
  px(ctx,x,y,52,64,'rgba(0,0,0,.65)')
  px(ctx,x+4,y+4,44,56,c)
  for(let r=0;r<5;r++)for(let col=0;col<4;col++)if((r*3+col+x)%3)px(ctx,x+10+col*8,y+10+r*8,5,4,'#111')
  px(ctx,x+9,y+50,30,5,'#ffe66d')
}
function drawShop(ctx,x,y,w,c1,c2,label){
  px(ctx,x,y,w,116,'#070812'); px(ctx,x,y,w,28,c1); px(ctx,x,y+28,w,5,'#8f8ca9')
  for(let i=0;i<w;i+=22)px(ctx,x+i,y+31,14,14,c2)
  px(ctx,x+12,y+52,w-24,44,'#141820'); px(ctx,x+18,y+58,w-36,7,c2)
  ctx.font='900 16px ui-rounded,system-ui';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='#290a17';ctx.fillStyle='#ffd166';ctx.strokeText(label,x+w/2,y+22);ctx.fillText(label,x+w/2,y+22)
}
function drawPoster(ctx,x,y,c,label){
  px(ctx,x,y,70,92,'#08070d'); px(ctx,x+5,y+5,60,82,c); px(ctx,x+11,y+12,48,8,'#ffd166')
  for(let r=0;r<5;r++)for(let col=0;col<5;col++)if((r+col)%2)px(ctx,x+13+col*9,y+28+r*9,5,5,'#070912')
  ctx.font='900 13px ui-rounded,system-ui'; ctx.textAlign='center'; ctx.lineWidth=3; ctx.strokeStyle='#070912'; ctx.fillStyle='#fff'; ctx.strokeText(label,x+35,y+78); ctx.fillText(label,x+35,y+78)
}
function drawFence(ctx,x,y){
  for(let i=0;i<8;i++){px(ctx,x+i*14,y,7,54,'#504a5e');px(ctx,x+i*14+2,y+3,2,48,'#9a94aa')}
  px(ctx,x-5,y+16,120,6,'#2b2736'); px(ctx,x-5,y+34,120,6,'#2b2736')
}
function drawBarrel(ctx,x,y,c){
  px(ctx,x,y,42,56,'#232034'); px(ctx,x+5,y-5,32,8,'#878097'); px(ctx,x+7,y+5,28,46,'#5a526e')
  px(ctx,x+14,y+2,4,50,'#b8b0ca'); px(ctx,x+27,y+2,4,50,'#211c2f'); px(ctx,x+4,y+21,34,5,c)
}
function drawFire(ctx,x,y){
  px(ctx,x,y+32,44,18,'#222'); px(ctx,x+8,y+8,10,35,'#bb2d16'); px(ctx,x+18,y,12,44,'#ff8f1f'); px(ctx,x+26,y+14,9,28,'#ffd166')
}
function drawSlot(ctx,x,y,c){
  px(ctx,x,y,54,86,'#141018'); px(ctx,x+5,y+5,44,76,'#413447'); px(ctx,x+9,y+11,36,22,'#090b14')
  px(ctx,x+13,y+17,6,10,c); px(ctx,x+24,y+17,6,10,'#ffd166'); px(ctx,x+35,y+17,6,10,c)
  px(ctx,x+11,y+43,32,7,'#d7d9e7'); px(ctx,x+15,y+56,24,16,'#211827'); px(ctx,x+45,y+25,6,30,'#d7d9e7')
}
function drawStairs(ctx,x,y,w,h,c){
  for(let i=0;i<8;i++){ px(ctx,x+i*w/8,y+i*h/8,w-i*w/8,h/10,c); px(ctx,x+i*w/8,y+i*h/8,w-i*w/8,3,'#aaa2bf') }
}
function drawPlane(ctx,x,y,c){
  px(ctx,x,y+26,270,38,'#d9e7ef'); px(ctx,x+36,y+10,112,32,'#f7fbff'); px(ctx,x+176,y+18,78,18,'#c1d3dd')
  px(ctx,x+14,y+38,240,8,c); for(let i=0;i<7;i++)px(ctx,x+58+i*22,y+24,10,8,'#243448')
  px(ctx,x+212,y,28,32,'#f7fbff'); px(ctx,x+20,y+64,70,12,'#97a5ad')
}
function drawTorii(ctx,x,y,c){
  px(ctx,x,y,172,14,c); px(ctx,x+16,y+16,140,9,c); px(ctx,x+25,y+20,13,150,c); px(ctx,x+135,y+20,13,150,c)
  px(ctx,x+19,y+38,125,8,'#201316')
}
function drawCrates(ctx,x,y,c){
  for(let i=0;i<4;i++){ const xx=x+(i%2)*58, yy=y+(i>1?42:0); px(ctx,xx,yy,54,40,'#251a15'); px(ctx,xx+4,yy+4,46,32,c); px(ctx,xx+8,yy+8,38,3,'rgba(255,255,255,.18)'); px(ctx,xx+24,yy+4,4,32,'rgba(0,0,0,.25)') }
}
function drawTrees(ctx,x,y){
  for(let i=0;i<4;i++){ const xx=x+i*95; px(ctx,xx+22,y,32,194,'#3b281f'); px(ctx,xx+30,y+10,8,180,'#7d5a3f'); px(ctx,xx,y-34,86,70,'#1b4c34'); px(ctx,xx+16,y-56,64,66,'#286b46') }
}

function playerFrame(e=player){
  const t = Math.floor(performance.now()/140)
  if (e.hurt > 0) return frameAt(PLAYER_SPRITES.hurt, e.hurt > 240 ? 0 : 1)
  if (e.z > 0) return frameAt(PLAYER_SPRITES.jump, e.z > 45 ? 1 : 0)
  if (e.guard) return frameAt(PLAYER_SPRITES.guard, t % PLAYER_SPRITES.guard.length)
  if (e.atk > 0 && e.kind === 'kick') return frameAt(PLAYER_SPRITES.kick, e.atk > 220 ? 0 : e.atk > 105 ? 1 : 2)
  if (e.atk > 0) return frameAt(PLAYER_SPRITES.punch, e.atk > 155 ? 0 : e.atk > 70 ? 1 : 2)
  if (keys.left || keys.right || keys.up || keys.down) return frameAt(PLAYER_SPRITES.walk, t % PLAYER_SPRITES.walk.length)
  return PLAYER_SPRITES.idle[0]
}
function drawPlayerSprite(ctx,e){
  const sx = Math.round(e.x-cam), sy = Math.round(e.y*H-(e.z||0))
  const frame = playerFrame(e)
  ctx.save()
  ctx.translate(sx,sy)
  ctx.scale(e.face,1)
  if (e.hurt>0 && Math.floor(e.hurt/55)%2) ctx.globalAlpha=.58
  px(ctx,-46,13,92,12,'rgba(0,0,0,.5)')
  ctx.imageSmoothingEnabled = false
  drawSpriteFrame(ctx,assets.player,frame,.72,18)
  if (e.guard) { ctx.strokeStyle='#9ee7ff'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(17,-72,48,-1.25,1.25); ctx.stroke() }
  ctx.restore()
}
function enemyFrame(e){
  const t = Math.floor(performance.now()/150)
  if (e.hurt > 0) return frameAt(ENEMY_SPRITES.hurt, e.hurt > 90 ? 0 : 1)
  if (e.z > 0) return frameAt(ENEMY_SPRITES.jump, t % ENEMY_SPRITES.jump.length)
  if (e.tele > 0) return frameAt(ENEMY_SPRITES.guard, t % ENEMY_SPRITES.guard.length)
  if (e.atk > 0 && e.role === 'bruiser') return frameAt(ENEMY_SPRITES.kick, e.atk > 170 ? 0 : 1)
  if (e.atk > 0) return frameAt(ENEMY_SPRITES.punch, e.atk > 170 ? 0 : e.atk > 75 ? 1 : 2)
  if (Math.abs(player.x-e.x) > 70 || Math.abs(player.y-e.y) > .04) return frameAt(ENEMY_SPRITES.walk, t % ENEMY_SPRITES.walk.length)
  return ENEMY_SPRITES.idle[0]
}
function drawEnemySprite(ctx,e){
  const sx = Math.round(e.x-cam), sy = Math.round(e.y*H-(e.z||0))
  const frame = enemyFrame(e)
  const roleScale = e.role === 'bruiser' ? 1.12 : e.role === 'runner' ? .92 : e.role === 'thrower' ? .98 : 1
  ctx.save()
  ctx.translate(sx,sy)
  ctx.scale((e.face === -1 ? 1 : -1) * roleScale, roleScale)
  if (e.hurt>0 && Math.floor(e.hurt/55)%2) ctx.globalAlpha=.58
  px(ctx,-46,13,92,12,'rgba(0,0,0,.5)')
  if (e.tele > 0) {
    ctx.globalAlpha=.85
    ctx.strokeStyle=e.palette.shirt
    ctx.lineWidth=5
    ctx.beginPath(); ctx.arc(0,-70,52,0,Math.PI*2); ctx.stroke()
    ctx.globalAlpha=1
  }
  ctx.imageSmoothingEnabled = false
  drawSpriteFrame(ctx,assets.enemy,frame,.72,18)
  ctx.restore()
}

  else for(let y=0;y<8;y++){for(let x=0;x<18;x++){if((x+y)%2)px(ctx,x*76-(cam*.08%76),H*(.58+y*.038),70,2,'rgba(255,255,255,.09)');else px(ctx,x*76-(cam*.08%76),H*(.58+y*.038),70,2,'rgba(0,0,0,.18)')}}
  ctx.strokeStyle='rgba(255,255,255,.13)'; for(let y=0;y<6;y++){ctx.beginPath();ctx.moveTo(0,H*(.62+y*.045));ctx.lineTo(W,H*(.62+y*.045));ctx.stroke()}
  for(let y=0;y<9;y++)for(let x=0;x<22;x++){ if((x*7+y*5)%11<5) px(ctx,x*60-(cam*.12%60),H*(.6+y*.035)+((x+y)%2)*3,34,2,'rgba(255,255,255,.055)') }
  for(let i=0;i<12;i++){ const x=i*210-(cam*.7%210), y=H*.42; if(i%4===0)drawGlyphs(ctx,x,y,level.neon); else if(i%4===1)drawBarrel(ctx,x,y+40,level.alt); else if(i%4===2)drawFire(ctx,x,y+24); else drawFence(ctx,x,y+38) }
  for(let i=0;i<8;i++){
    const x=i*300-(cam*.78%300), y=H*.72+(i%2)*22
    px(ctx,x,y+42,72,18,'rgba(0,0,0,.38)')
    px(ctx,x+8,y+6,18,50,'#1b1a25'); px(ctx,x+14,y,24,56,'#343148'); px(ctx,x+25,y+8,12,42,'#11131c')
    px(ctx,x+46,y+18,46,34,'#0b0c12'); px(ctx,x+52,y+24,34,9,level.neon); px(ctx,x+54,y+38,29,5,'#5d647a')
  }
}
function drawStageBitmap(ctx,image){
  const scale = Math.max(H / image.naturalHeight, W / image.naturalWidth)
  const iw = image.naturalWidth * scale, ih = image.naturalHeight * scale
  let x = -((cam*.36) % iw)
  while (x > 0) x -= iw
  for (; x < W; x += iw) ctx.drawImage(image,x,(H-ih)/2,iw,ih)
  px(ctx,0,H*.84,W,H*.16,'rgba(5,6,14,.22)')
}
function draw(api){
  const {ctx,W:ww,H:hh,art}=api; W=ww; H=hh
  ctx.imageSmoothingEnabled=false
  drawStage(ctx,art)
  projectiles.forEach(p=>{
    const s = p.big ? 34 : 20
    px(ctx,p.x-cam-s/2,p.y*H-58,s,s,p.color); px(ctx,p.x-cam-s/4,p.y*H-58+s/4,s/2,s/2,'#fff')
    px(ctx,p.x-cam-(p.vx>0?42:-8),p.y*H-52,p.big?36:20,6,'rgba(255,255,255,.28)')
  })
  defeated.sort((a,b)=>a.y-b.y).forEach(d=>drawDowned(ctx,d))
  const actors=[...enemies,player].sort((a,b)=>a.y-b.y); actors.forEach(a=>drawHero(ctx,a,a===player,art))
  drawPortrait(ctx,18,14,false)
  px(ctx,110,22,270,28,'#08081b'); px(ctx,118,30,252*Math.max(0,player.hp/player.max),12,'#42e6b5')
  ctx.strokeStyle='#23d5ff'; ctx.lineWidth=4; ctx.strokeRect(110,22,270,28)
  text(ctx,'SCORE '+G.score.toString().padStart(6,'0'),110,78,24,'#61ff6a')
  text(ctx,'STAGE '+(levelIndex+1)+'  '+level.name,18,108,16,'#ffd166')
  if (player.combo > 1) text(ctx,'COMBO x'+player.combo, W-22, H-86, 22, '#ffd166', 'right')
  const boss=enemies.find(e=>e.type==='boss'); if(boss)drawBossBar(ctx,boss)
  if(flash>0){ctx.globalAlpha=Math.min(1,flash/450);text(ctx,message,W/2,H*.25,32,'#fff','center');ctx.globalAlpha=1}
  if (W < 900) text(ctx,'MOVE ARROWS/WASD   PUNCH J/ENTER   KICK K   JUMP SPACE   GUARD L',18,H-22,12,'rgba(255,255,255,.78)')
}

G=Harness.start({
  title:'Neon Gauntlet',
  scoreLabel:'Respect',
  hint:'Teen arcade brawler: fight across 10 neon districts. Each stage ends with a hard boss.',
  overTitle:'Gauntlet finished',
  reset,onResize(w,h){W=w;H=h},onKey,onButton,onSwipe(d){keys[d]=true;setTimeout(()=>keys[d]=false,170)},onPointer(){},update,draw
})
window.addEventListener('mouseup',stopGuard); window.addEventListener('touchend',stopGuard)
</script></body></html>
